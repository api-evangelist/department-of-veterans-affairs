specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Department of Veterans Affairs (VA)
providerId: department-of-veterans-affairs
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Federal Government
  - Healthcare
  - Veterans
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Department of Veterans Affairs (VA) API surface.
  Captures per-tier quotas, burst behavior, response signaling, and recovery semantics. Defaults are scaffold
  values to be replaced with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - VA Facilities API
      - VA Forms API
      - VA Benefits Claims API
      - VA Benefits Intake API
      - VA Appeals Status API
      - VA Clinical Health API (FHIR)
      - VA Veteran Confirmation API
      - VA Address Validation API
      - VA Benefits Documents API
      - VA Benefits Reference Data API
      - VA Community Care Eligibility API
      - VA Decision Reviews API
      - VA Direct Deposit Management API
      - VA Education Benefits API
      - VA Loan Guaranty API
      - VA Loan Review API
      - VA Guaranty Remittance API
      - VA Letter Generator API
      - VA Patient Health API (FHIR)
      - VA Veteran Service History and Eligibility API
  - tier: free
    name: Free Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 1000
    timeFrame: month
    applies:
      - VA Facilities API
      - VA Forms API
      - VA Benefits Claims API
      - VA Benefits Intake API
      - VA Appeals Status API
