description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: department-of-veterans-affairs-free
    name: Free
    type: freemium
    description: Free entry tier for the Department of Veterans Affairs (VA) API surface. Intended for
      evaluation, prototyping, and low-volume integrations. Real limits and pricing must be reconciled
      with the provider's published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://api.va.gov/services/va_facilities/v1
          - https://api.va.gov/services/va_forms/v0
          - https://api.va.gov/services/claims/v2
          - https://api.va.gov/services/vba_documents/v1
          - https://api.va.gov/services/appeals/v1
          - https://api.va.gov/services/fhir/v0/r4
          - https://api.va.gov/services/veteran_confirmation/v1
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://api.va.gov/services/va_facilities/v1
          - https://api.va.gov/services/va_forms/v0
          - https://api.va.gov/services/claims/v2
          - https://api.va.gov/services/vba_documents/v1
