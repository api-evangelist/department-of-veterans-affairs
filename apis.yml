aid: department-of-veterans-affairs
name: Department of Veterans Affairs (VA)
description: >-
  The Department of Veterans Affairs (VA) provides health care, benefits,
  and memorial services to U.S. military Veterans and their families. The VA
  API Platform at developer.va.gov publishes a structured catalog of APIs
  spanning Veteran identity confirmation, benefits claims, appeals, document
  intake, education, loan guaranty, facilities, forms, and HL7 FHIR clinical
  health data.
